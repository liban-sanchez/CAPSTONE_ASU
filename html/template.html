<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      color: #222;
      background: #fafafa;
      font-size: 18px;
    }
    img, video { max-width: 100%; height: auto; border-radius: 8px; }
    h1 { font-size: 2.2em; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 5px; }
    .byline { color: #666; font-size: 0.9em; margin-bottom: 20px; font-style: italic; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    blockquote { border-left: 4px solid #ccc; margin-left: 0; padding-left: 1rem; color: #555; }
  </style>
</head>
<body>
  <h1>{{TITLE}}</h1>
  {{BYLINE}}
  {{CONTENT}}
</body>
</html>
