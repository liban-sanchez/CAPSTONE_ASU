<!-- This is the HTML for the external window that opens once the user presses download button. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta Tags -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Page Title -->
    <title>Grey-Box</title>

    <!-- Bootstrap CSS (Local) -->
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="py-2 px-2 me-0">
 <!-- Header Section -->
<section class="gb-card gb-hero p-3 mb-3 text-center">
  <!-- NEW: cleaner header instead of heavy gray bar -->
  <h5 class="fw-bold mb-1">
    Foreground Crawl Running
  </h5>

  <div class="small text-muted">
    Please keep this window open while processing.
  </div>
</section>

   <!-- Progress Section -->
<section class="gb-card p-3">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="gb-section-title">Progress</div>

    <!-- NEW: percentage text -->
    <div id="current-progress" class="small fw-semibold text-muted"></div>
  </div>

  <!-- Progress Bar -->
  <div class="gb-progress-wrap">
    <div
      id="progress-bar"
      class="progress-bar progress-bar-striped progress-bar-animated"
      role="progressbar"
      style="width: 0%;"
    ></div>
  </div>

  <!-- Existing status message -->
  <div id="status-message" class="text-center text-muted small mt-3">
    Foreground crawl is running.
  </div>

      <!-- Status Message Section -->
      <section class="mt-2">
        <div id="status-message" class="text-center text-muted small">
          Foreground crawl is running. Please keep this window open.
        </div>
      </section>

  <!-- Feedback Section -->
  <section id="feedback-form-section" class="mt-3" style="display: none;">
    <div class="text-center">
      <!-- Existing text -->
      Foreground crawl complete. Your download is ready.

      <!-- Existing button -->
      <a
        class="btn btn-secondary btn-sm mt-2"
        href="https://forms.gle/p6quKSCDj5PoyVb37"
        target="_blank"
      >
        Please provide feedback
      </a>
    </div>
  </section>
    </main>

    <!-- JS Scripts -->
    <script src="../js/jszip/jszip.js"></script>
    <script src="../js/jszip/jszip-utils.js"></script>
    <script src="../js/jquery/jquery-3.6.0.min.js"></script>

    <!-- Ordering Is Important -->
    <script src="../js/utils/utility-functions.js"></script>
    <script src="../lib/Readability.js"></script>
    <script src="../js/window.js"></script>
    <script src="../js/bootstrap/bootstrap.min.js"></script>
    <script src="../js/bootstrap/tooltip.js"></script>
  </body>
</html>
